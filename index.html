<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local CV Builder</title>
  <style>
    :root{--bg:#eef2f7;--panel:#fff;--ink:#172033;--muted:#667085;--line:#d9e0ea;--brand:#2563eb;--brand-dark:#1d4ed8;--danger:#dc2626;--ok:#15803d;--shadow:0 18px 45px rgba(15,23,42,.12);--radius:18px}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}button,input,textarea,select{font:inherit}.file-input-proxy{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}button{border:0;border-radius:10px;padding:.6rem .85rem;background:#e8eef8;color:#172033;cursor:pointer;font-weight:700;transition:.15s ease}button:hover{transform:translateY(-1px);background:#dbe6f6}.btn-primary{background:var(--brand);color:#fff}.btn-primary:hover{background:var(--brand-dark)}.btn-danger{background:#fee2e2;color:#991b1b}.btn-danger:hover{background:#fecaca}.btn-ghost{background:transparent;border:1px solid var(--line)}.app{min-height:100vh}.toolbar{position:sticky;top:0;z-index:20;display:flex;gap:.8rem;align-items:center;justify-content:space-between;padding:1rem 1.25rem;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}.brand{display:flex;flex-direction:column}.brand strong{font-size:1.1rem}.status{font-size:.85rem;color:var(--ok)}.actions{display:flex;gap:.55rem;flex-wrap:wrap;align-items:center}.template-picker{display:flex;gap:.4rem;align-items:center}.template-picker select{border:1px solid var(--line);border-radius:10px;padding:.55rem .75rem;background:#fff}.layout{display:grid;grid-template-columns:minmax(360px,480px) 1fr;gap:1.25rem;padding:1.25rem;align-items:start}.editor{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:1rem;max-height:calc(100vh - 100px);overflow:auto}.preview-wrap{display:flex;justify-content:center;overflow:auto;padding:.25rem}.editor h2{margin:.25rem 0 1rem}.editor-tabs{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin:0 0 1rem;padding:.35rem;background:#eef2f7;border:1px solid var(--line);border-radius:14px}.editor-tab{background:transparent;color:var(--muted);border-radius:10px}.editor-tab[aria-selected="true"]{background:#fff;color:var(--brand);box-shadow:0 6px 18px rgba(15,23,42,.08)}.editor-tab-panel[hidden]{display:none}.editor-card{border:1px solid var(--line);border-radius:16px;padding:1rem;margin-bottom:1rem;background:#fbfdff}.editor-card h3{margin:.1rem 0 .8rem;font-size:1rem}.grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}.field{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.75rem}.field label{font-size:.82rem;font-weight:800;color:#344054}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:10px;padding:.65rem .75rem;background:#fff;color:var(--ink)}.field textarea{min-height:88px;resize:vertical}.style-grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem}.color-input{height:42px;padding:.2rem!important}.cv-page{--tpl-page-bg:#ffffff;--tpl-header-bg:transparent;--tpl-accent:#111827;--tpl-name:#111827;--tpl-headline:#475467;--tpl-contact:#475467;--tpl-heading:#111827;--tpl-label:#111827;--tpl-body:#253044;--tpl-header-font:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;--tpl-body-font:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;--tpl-label-font:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.section-head,.entry-head{display:flex;gap:.5rem;align-items:center;justify-content:space-between;margin-bottom:.7rem}.mini-actions{display:flex;gap:.35rem;flex-wrap:wrap}.mini-actions button{padding:.42rem .58rem;font-size:.82rem}.entry{border:1px dashed #cbd5e1;border-radius:14px;padding:.75rem;margin:.75rem 0;background:#fff}.error{color:#991b1b;background:#fee2e2;border-radius:10px;padding:.6rem .8rem;margin:.7rem 0;display:none}.cv-page{width:210mm;min-height:297mm;background:var(--tpl-page-bg);box-shadow:var(--shadow);color:var(--tpl-body);font-family:var(--tpl-body-font)}.cv-inner{padding:18mm}.cv-header{border-bottom:3px solid var(--tpl-accent);background:var(--tpl-header-bg);padding-bottom:12px;margin-bottom:22px}.cv-name{font-family:var(--tpl-header-font);color:var(--tpl-name);font-size:34px;line-height:1.05;margin:0 0 7px;letter-spacing:-.04em}.cv-headline{font-family:var(--tpl-body-font);font-size:16px;color:var(--tpl-headline);margin:0 0 10px}.cv-contact{display:flex;flex-wrap:wrap;gap:8px 16px;color:var(--tpl-contact);font-size:12.5px}.cv-section{margin:0 0 20px;break-inside:avoid}.cv-section h2{font-family:var(--tpl-header-font);font-size:15px;text-transform:uppercase;letter-spacing:.12em;margin:0 0 10px;color:var(--tpl-heading)}.cv-entry{margin:0 0 9px;break-inside:avoid}.cv-label{font-family:var(--tpl-label-font);font-weight:800;color:var(--tpl-label);margin-right:.35rem}.cv-value{font-family:var(--tpl-body-font);white-space:pre-wrap;line-height:1.5;color:var(--tpl-body)}.template-modern .cv-inner{padding:17mm}.template-modern .cv-header{border:0;background:var(--tpl-header-bg,linear-gradient(135deg,#eff6ff,#f8fafc));border-radius:18px;padding:22px}.template-modern .cv-section h2{color:var(--tpl-heading);border-bottom:1px solid var(--tpl-accent);padding-bottom:6px}.template-classic{font-family:Georgia,Times New Roman,serif}.template-classic .cv-header{text-align:center;border-bottom:1px solid var(--tpl-accent)}.template-classic .cv-name{font-size:32px;letter-spacing:0}.template-classic .cv-contact{justify-content:center}.template-classic .cv-section h2{text-align:center;border-top:1px solid var(--tpl-accent);border-bottom:1px solid var(--tpl-accent);padding:5px 0;letter-spacing:.08em}.template-minimal .cv-inner{padding:24mm}.template-minimal .cv-header{border-bottom:1px solid #e5e7eb}.template-minimal .cv-name{font-weight:500}.template-minimal .cv-section h2{font-size:12px;color:var(--tpl-heading);border-bottom:1px solid var(--tpl-accent);padding-bottom:8px}.template-minimal .cv-value{color:var(--tpl-body)}.template-sidebar .cv-inner{padding:0;display:grid;grid-template-columns:68mm 1fr;min-height:297mm}.template-sidebar .side{background:var(--tpl-sidebar-bg,var(--tpl-header-bg));color:var(--tpl-name);padding:18mm 10mm}.template-sidebar .main{padding:18mm 13mm}.template-sidebar .cv-header{border:0;padding:0;margin:0}.template-sidebar .cv-name{color:var(--tpl-name);font-size:28px}.template-sidebar .cv-headline,.template-sidebar .cv-contact{color:var(--tpl-contact);display:block}.template-sidebar .cv-contact span{display:block;margin:.45rem 0;overflow-wrap:anywhere}.template-sidebar .cv-section h2{color:var(--tpl-heading);border-bottom:2px solid var(--tpl-accent);padding-bottom:6px}.empty{color:#98a2b3;font-style:italic}.help-text{margin:.35rem 0 0;color:var(--muted);font-size:.85rem;line-height:1.4}@media(max-width:980px){.layout{grid-template-columns:1fr}.editor-tabs{grid-template-columns:1fr}.editor{max-height:none}.cv-page{width:100%;min-height:auto}.grid{grid-template-columns:1fr}.toolbar{position:static;align-items:flex-start;flex-direction:column}.template-sidebar .cv-inner{grid-template-columns:1fr}.template-sidebar .side,.template-sidebar .main{padding:1.5rem}}@page{size:A4;margin:0}@media print{body{background:#fff}.toolbar,.editor{display:none!important}.layout{display:block;padding:0}.preview-wrap{padding:0;overflow:visible}.cv-page{box-shadow:none;width:210mm;min-height:297mm;margin:0 auto}.cv-section,.cv-entry{break-inside:avoid}.template-modern .cv-header{border:1px solid var(--tpl-accent)}}
  </style>
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="brand"><strong>Local CV Builder</strong><span id="status" class="status">Ready</span></div>
      <div class="actions">
        <label class="template-picker">Template <select id="templateSelect" aria-label="Choose CV template"></select></label>
        <button id="saveCvBtn" type="button">Save CV</button><button id="openCvBtn" type="button">Open CV</button><input id="openCvFile" class="file-input-proxy" type="file" accept="application/json,.json" aria-hidden="true" tabindex="-1">
        <button id="openTemplateBtn" type="button">Open Template</button><input id="openTemplateFile" class="file-input-proxy" type="file" accept="application/json,.cvtemplate+json,.cvtemplate" aria-hidden="true" tabindex="-1">
        <button id="exportPdfBtn" class="btn-primary" type="button">Export PDF</button><button id="resetBtn" class="btn-danger" type="button">Reset sample data</button>
      </div>
    </header>
    <main class="layout"><aside class="editor" id="editor" aria-label="CV editor"></aside><section class="preview-wrap" aria-label="Live CV preview"><div id="preview"></div></section></main>
  </div>
<script type="module">
import { templates } from './templates/index.js';

const STORAGE_KEY='localCvBuilderDataV1';
const uid=prefix=>prefix+'-'+Math.random().toString(36).slice(2,9)+'-'+Date.now().toString(36);
let cvData;
let activeEditorTab='content';
const dynamicTemplates={};
const fontChoices=['Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif','Georgia, Times New Roman, serif','Arial, Helvetica, sans-serif','Verdana, Geneva, sans-serif','Trebuchet MS, Arial, sans-serif','Courier New, Courier, monospace'];
const fontNames=['Inter / System','Georgia','Arial','Verdana','Trebuchet MS','Courier New'];
function defaultStyles(){return{colors:{page:'#ffffff',header:'#eff6ff',sidebar:'#172033',accent:'#2563eb',name:'#111827',headline:'#475467',contact:'#475467',sectionHeading:'#2563eb',label:'#111827',body:'#253044'},fonts:{headers:fontChoices[0],paragraphs:fontChoices[0],labels:fontChoices[0]}};}
function createDefaultData(){return{version:1,meta:{documentTitle:'My CV',selectedTemplate:'modern'},styles:defaultStyles(),profile:{fullName:'Your Name',headline:'Solution Architect / Web Developer',email:'you@example.com',phone:'+1 555 010 1234',location:'City, Country',website:'yourwebsite.com',linkedin:'linkedin.com/in/yourname',github:'github.com/yourname'},sections:[{id:'summary',type:'section',heading:'Professional Summary',entries:[{id:uid('entry'),label:'',value:'Solution Architect and Web Developer with experience designing scalable digital products, integrating business systems, and leading delivery from discovery through launch. Strong focus on clean architecture, pragmatic engineering, accessibility, and measurable outcomes.'}]},{id:'experience',type:'section',heading:'Experience',entries:[{id:uid('entry'),label:'Company',value:'Example Technology Group'},{id:uid('entry'),label:'Role',value:'Senior Solution Architect'},{id:uid('entry'),label:'Period',value:'Jan 2022 - Present'},{id:uid('entry'),label:'Description',value:'Led architecture for customer-facing web platforms, defined integration patterns, and partnered with product, design, and engineering teams. Improved deployment reliability, clarified technical roadmaps, and mentored developers across frontend and backend practices.'}]},{id:'projects',type:'section',heading:'Projects',entries:[{id:uid('entry'),label:'CV Builder Platform',value:'Designed a browser-only document editor with import/export workflows, local persistence, and print-ready rendering.'},{id:uid('entry'),label:'Integration Modernization',value:'Migrated legacy data exchange flows to API-first services with validation, observability, and clear ownership boundaries.'}]},{id:'skills',type:'section',heading:'Skills',entries:[{id:uid('entry'),label:'Architecture',value:'Solution design, domain modeling, API design, integrations, cloud-ready systems'},{id:uid('entry'),label:'Web',value:'HTML, CSS, JavaScript, accessibility, responsive UI, performance optimization'},{id:uid('entry'),label:'Delivery',value:'Technical discovery, stakeholder communication, documentation, mentoring'}]},{id:'education',type:'section',heading:'Education',entries:[{id:uid('entry'),label:'Degree',value:'B.Sc. Computer Science or equivalent experience'},{id:uid('entry'),label:'Institution',value:'University / Institution Name'}]},{id:'languages',type:'section',heading:'Languages',entries:[{id:uid('entry'),label:'English',value:'Professional proficiency'},{id:uid('entry'),label:'Additional language',value:'Conversational'}]}]};}
function escapeHtml(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function loadData(){try{const saved=localStorage.getItem(STORAGE_KEY);cvData=saved?validateData(JSON.parse(saved)):createDefaultData();}catch(e){cvData=createDefaultData();setStatus('Could not load saved data; using sample',true);} }
function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(cvData));setStatus('Saved locally');}
function setStatus(msg,isError){const el=document.getElementById('status');el.textContent=msg;el.style.color=isError?'#991b1b':'#15803d';}
function validateData(data){if(!data||typeof data!=='object')throw new Error('JSON must be an object.');if(!data.profile||typeof data.profile!=='object')throw new Error('Missing profile object.');if(!Array.isArray(data.sections))throw new Error('Missing sections array.');const clean=createDefaultData();clean.version=Number(data.version)||1;clean.meta={documentTitle:String(data.meta?.documentTitle||'My CV'),selectedTemplate:availableTemplates()[data.meta?.selectedTemplate]?data.meta.selectedTemplate:'modern'};clean.styles=normalizeStyles(data.styles);clean.profile={...clean.profile,...Object.fromEntries(Object.keys(clean.profile).map(k=>[k,String(data.profile[k]??'')]))};clean.sections=data.sections.map((s,i)=>({id:String(s.id||uid('section')),type:'section',heading:String(s.heading||'Section '+(i+1)),entries:Array.isArray(s.entries)?s.entries.map(e=>({id:String(e.id||uid('entry')),label:String(e.label??''),value:String(e.value??'')})):[]}));return clean;}
function renderEditor(){const editor=document.getElementById('editor');editor.innerHTML=`<h2>Editor</h2><div class="editor-tabs" role="tablist" aria-label="Editor panels"><button class="editor-tab" id="contentTab" role="tab" aria-controls="contentPanel" aria-selected="${activeEditorTab==='content'}" data-editor-tab="content">Content</button><button class="editor-tab" id="templatesTab" role="tab" aria-controls="templatesPanel" aria-selected="${activeEditorTab==='templates'}" data-editor-tab="templates">Templates & styles</button></div><div id="error" class="error"></div><div class="editor-tab-panel" id="contentPanel" role="tabpanel" aria-labelledby="contentTab" ${activeEditorTab==='content'?'':'hidden'}><div class="editor-card"><h3>Profile</h3><div class="grid">${Object.keys(cvData.profile).map(k=>fieldHtml('profile',k,labelize(k),cvData.profile[k],k==='headline')).join('')}</div></div><div class="section-head"><h2>Sections</h2><button id="addSectionBtn" class="btn-primary">Add section</button></div><div id="sections"></div></div><div class="editor-tab-panel" id="templatesPanel" role="tabpanel" aria-labelledby="templatesTab" ${activeEditorTab==='templates'?'':'hidden'}>${templateEditorHtml()}${styleEditorHtml()}</div>`;document.getElementById('sections').innerHTML=cvData.sections.map((s,si)=>sectionEditorHtml(s,si)).join('');bindEditorEvents();}
function normalizeStyles(styles){const d=defaultStyles(),src=styles&&typeof styles==='object'?styles:{},colors={...d.colors},fonts={...d.fonts};Object.keys(colors).forEach(k=>{const v=String(src.colors?.[k]||colors[k]);colors[k]=/^#[0-9a-f]{6}$/i.test(v)?v:colors[k];});Object.keys(fonts).forEach(k=>{const v=String(src.fonts?.[k]||fonts[k]);fonts[k]=fontChoices.includes(v)?v:fonts[k];});return{colors,fonts};}
function colorField(key,label){return `<div class="field"><label for="style-color-${key}">${label}</label><input class="color-input" id="style-color-${key}" type="color" data-style-color="${key}" value="${escapeHtml(cvData.styles.colors[key])}"></div>`;}
function fontField(key,label){return `<div class="field"><label for="style-font-${key}">${label}</label><select id="style-font-${key}" data-style-font="${key}">${fontChoices.map((f,i)=>`<option value="${escapeHtml(f)}" ${cvData.styles.fonts[key]===f?'selected':''}>${fontNames[i]}</option>`).join('')}</select></div>`;}
function availableTemplates(){return{...templates,...dynamicTemplates};}
function templateOptionsHtml(){return Object.entries(availableTemplates()).map(([k,t])=>`<option value="${escapeHtml(k)}" ${cvData.meta.selectedTemplate===k?'selected':''}>${escapeHtml(t.name)}</option>`).join('');}
function templateEditorHtml(){return `<div class="editor-card"><h3>Template</h3><div class="field"><label for="sidebarTemplateSelect">Choose CV template</label><select id="sidebarTemplateSelect">${templateOptionsHtml()}</select></div><p class="help-text">Use Open Template in the toolbar to load a custom .cvtemplate JSON file for this session.</p></div>`;}
function selectedTemplate(){return availableTemplates()[cvData.meta.selectedTemplate]||templates.modern;}
function styleEditorHtml(){const template=selectedTemplate();const fields=template.styleFields||{};const colorFields=fields.colors||[];const fontFields=fields.fonts||[];return `<div class="editor-card"><div class="section-head"><h3>${escapeHtml(template.name)} styles</h3><button id="resetStylesBtn" class="btn-ghost" type="button">Reset styles</button></div><h3>Colors</h3><div class="style-grid">${colorFields.map(([k,l])=>colorField(k,l)).join('')}</div><h3>Fonts</h3><div class="style-grid">${fontFields.map(([k,l])=>fontField(k,l)).join('')}</div></div>`;}
function labelize(k){return k.replace(/([A-Z])/g,' $1').replace(/^./,m=>m.toUpperCase());}
function fieldHtml(scope,key,label,value,long){const id=scope+'-'+key;return `<div class="field"><label for="${id}">${escapeHtml(label)}</label>${long?`<textarea id="${id}" data-profile="${key}">${escapeHtml(value)}</textarea>`:`<input id="${id}" data-profile="${key}" value="${escapeHtml(value)}">`}</div>`;}
function sectionEditorHtml(s,si){return `<div class="editor-card"><div class="section-head"><strong>Section ${si+1}</strong><div class="mini-actions"><button data-move-section="${si},-1">↑</button><button data-move-section="${si},1">↓</button><button class="btn-danger" data-remove-section="${si}">Delete</button></div></div><div class="field"><label for="heading-${s.id}">Heading</label><input id="heading-${s.id}" data-section-heading="${si}" value="${escapeHtml(s.heading)}"></div>${s.entries.map((e,ei)=>entryEditorHtml(e,si,ei)).join('')}<button class="btn-primary" data-add-entry="${si}">Add key/value entry</button></div>`;}
function entryEditorHtml(e,si,ei){return `<div class="entry"><div class="entry-head"><strong>Entry ${ei+1}</strong><div class="mini-actions"><button data-move-entry="${si},${ei},-1">↑</button><button data-move-entry="${si},${ei},1">↓</button><button class="btn-danger" data-remove-entry="${si},${ei}">Delete</button></div></div><div class="field"><label>Label</label><input data-entry-label="${si},${ei}" value="${escapeHtml(e.label)}"></div><div class="field"><label>Value</label><textarea data-entry-value="${si},${ei}">${escapeHtml(e.value)}</textarea></div></div>`;}
function bindEditorEvents(){document.querySelectorAll('[data-editor-tab]').forEach(tab=>tab.addEventListener('click',()=>{activeEditorTab=tab.dataset.editorTab;renderEditor();}));const sidebarTemplateSelect=document.getElementById('sidebarTemplateSelect');if(sidebarTemplateSelect)sidebarTemplateSelect.onchange=()=>{cvData.meta.selectedTemplate=sidebarTemplateSelect.value;const toolbarSelect=document.getElementById('templateSelect');if(toolbarSelect)toolbarSelect.value=sidebarTemplateSelect.value;update(true);};document.querySelectorAll('[data-style-color]').forEach(el=>el.addEventListener('input',()=>{cvData.styles.colors[el.dataset.styleColor]=el.value;update();}));document.querySelectorAll('[data-style-font]').forEach(el=>el.addEventListener('change',()=>{cvData.styles.fonts[el.dataset.styleFont]=el.value;update();}));document.getElementById('resetStylesBtn').onclick=()=>{cvData.styles=defaultStyles();update(true);};document.querySelectorAll('[data-profile]').forEach(el=>el.addEventListener('input',()=>{cvData.profile[el.dataset.profile]=el.value;update();}));document.querySelectorAll('[data-section-heading]').forEach(el=>el.addEventListener('input',()=>{cvData.sections[+el.dataset.sectionHeading].heading=el.value;update();}));document.querySelectorAll('[data-entry-label]').forEach(el=>el.addEventListener('input',()=>{const[a,b]=el.dataset.entryLabel.split(',').map(Number);cvData.sections[a].entries[b].label=el.value;update();}));document.querySelectorAll('[data-entry-value]').forEach(el=>el.addEventListener('input',()=>{const[a,b]=el.dataset.entryValue.split(',').map(Number);cvData.sections[a].entries[b].value=el.value;update();}));document.getElementById('addSectionBtn').onclick=addSection;document.querySelectorAll('[data-add-entry]').forEach(b=>b.onclick=()=>addEntry(+b.dataset.addEntry));document.querySelectorAll('[data-remove-section]').forEach(b=>b.onclick=()=>removeSection(+b.dataset.removeSection));document.querySelectorAll('[data-remove-entry]').forEach(b=>b.onclick=()=>{const[a,c]=b.dataset.removeEntry.split(',').map(Number);removeEntry(a,c);});document.querySelectorAll('[data-move-section]').forEach(b=>b.onclick=()=>{const[a,d]=b.dataset.moveSection.split(',').map(Number);moveSection(a,d);});document.querySelectorAll('[data-move-entry]').forEach(b=>b.onclick=()=>{const[a,c,d]=b.dataset.moveEntry.split(',').map(Number);moveEntry(a,c,d);});}
function update(rerenderEditor){saveData();if(rerenderEditor)renderEditor();renderPreview();}
function contactHtml(p){return ['email','phone','location','website','linkedin','github'].filter(k=>p[k]).map(k=>`<span>${escapeHtml(p[k])}</span>`).join('');}
function sectionsHtml(){return cvData.sections.map(s=>`<section class="cv-section"><h2>${escapeHtml(s.heading)}</h2>${s.entries.length?s.entries.filter(e=>e.label||e.value).map(e=>`<div class="cv-entry">${e.label?`<span class="cv-label">${escapeHtml(e.label)}:</span>`:''}<span class="cv-value">${escapeHtml(e.value)}</span></div>`).join(''):'<p class="empty">No entries yet.</p>'}</section>`).join('');}
function headerHtml(){const p=cvData.profile;return `<header class="cv-header"><h1 class="cv-name">${escapeHtml(p.fullName||'Your Name')}</h1>${p.headline?`<p class="cv-headline">${escapeHtml(p.headline)}</p>`:''}<div class="cv-contact">${contactHtml(p)}</div></header>`;}
function styleVars(){const s=cvData.styles||defaultStyles(),c=s.colors,f=s.fonts;return `--tpl-page-bg:${c.page};--tpl-header-bg:${c.header};--tpl-sidebar-bg:${c.sidebar};--tpl-accent:${c.accent};--tpl-name:${c.name};--tpl-headline:${c.headline};--tpl-contact:${c.contact};--tpl-heading:${c.sectionHeading};--tpl-label:${c.label};--tpl-body:${c.body};--tpl-header-font:${f.headers};--tpl-body-font:${f.paragraphs};--tpl-label-font:${f.labels};`;}
function renderPreview(){cvData.styles=normalizeStyles(cvData.styles);document.getElementById('preview').innerHTML=selectedTemplate().render(templateContext());document.title=cvData.meta.documentTitle||'My CV';}
function templateContext(){return{cvData,page,headerHtml,sectionsHtml,styleVars,escapeHtml};}
function page(cls,body){return `<article class="cv-page ${cls}" style="${escapeHtml(styleVars())}"><div class="cv-inner">${body}</div></article>`;}
function addSection(){cvData.sections.push({id:uid('section'),type:'section',heading:'New Section',entries:[{id:uid('entry'),label:'Label',value:'Value'}]});update(true);}function removeSection(i){if(confirm('Delete this section?')){cvData.sections.splice(i,1);update(true);}}function addEntry(i){cvData.sections[i].entries.push({id:uid('entry'),label:'Label',value:'Value'});update(true);}function removeEntry(i,j){if(confirm('Delete this entry?')){cvData.sections[i].entries.splice(j,1);update(true);}}function moveSection(i,d){const n=i+d;if(n<0||n>=cvData.sections.length)return;[cvData.sections[i],cvData.sections[n]]=[cvData.sections[n],cvData.sections[i]];update(true);}function moveEntry(i,j,d){const arr=cvData.sections[i].entries,n=j+d;if(n<0||n>=arr.length)return;[arr[j],arr[n]]=[arr[n],arr[j]];update(true);}
function saveCv(){const blob=new Blob([JSON.stringify(cvData,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=((cvData.meta.documentTitle||'cv').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'cv')+'.json';a.style.display='none';document.body.appendChild(a);a.click();setTimeout(()=>URL.revokeObjectURL(a.href),0);a.remove();setStatus('CV saved');}
function openCv(file){const reader=new FileReader();reader.onload=()=>{try{const parsed=validateData(JSON.parse(reader.result));if(confirm('Open this CV and replace current CV data?')){cvData=parsed;saveData();init();setStatus('CV opened');}}catch(e){showError('Invalid CV file: '+e.message);}};reader.readAsText(file);}
function normalizeTemplateId(value){return String(value||'custom-template').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'custom-template';}
function compileTemplate(template){if(!template||typeof template!=='object')throw new Error('Template must be a JSON object.');const name=String(template.name||'Custom Template');const id=normalizeTemplateId(template.id||name);const html=String(template.html||'{{header}}{{sections}}');const css=String(template.css||'');const styleFields={colors:Array.isArray(template.styleFields?.colors)?template.styleFields.colors:undefined,fonts:Array.isArray(template.styleFields?.fonts)?template.styleFields.fonts:undefined};return{id,name,cssClass:'template-custom-'+id,styleFields:{colors:styleFields.colors||[['page','Page background'],['accent','Accent / rules'],['body','Body text']],fonts:styleFields.fonts||[['headers','Headers'],['paragraphs','Paragraphs']]},render:({page,headerHtml,sectionsHtml,escapeHtml})=>{const body=html.replace(/{{\s*header\s*}}/g,headerHtml()).replace(/{{\s*sections\s*}}/g,sectionsHtml()).replace(/{{\s*fullName\s*}}/g,escapeHtml(cvData.profile.fullName||''));return page('template-custom template-custom-'+id,body)+(css?`<style>${css}</style>`:'');}};}
function openTemplate(file){const reader=new FileReader();reader.onload=()=>{try{const custom=compileTemplate(JSON.parse(reader.result));dynamicTemplates[custom.id]=custom;cvData.meta.selectedTemplate=custom.id;saveData();init();setStatus('Template opened: '+custom.name);}catch(e){showError('Invalid template file: '+e.message);}};reader.readAsText(file);}
function showError(msg){const e=document.getElementById('error');if(e){e.textContent=msg;e.style.display='block';}setStatus(msg,true);}function exportPdf(){window.print();}
function openFilePicker(inputId){const input=document.getElementById(inputId);if(!input){showError('File picker is not available.');return;}input.click();}
function init(){const sel=document.getElementById('templateSelect');sel.innerHTML=templateOptionsHtml();sel.value=cvData.meta.selectedTemplate;sel.onchange=()=>{cvData.meta.selectedTemplate=sel.value;const sidebarTemplateSelect=document.getElementById('sidebarTemplateSelect');if(sidebarTemplateSelect)sidebarTemplateSelect.value=sel.value;update(true);};document.getElementById('saveCvBtn').onclick=saveCv;document.getElementById('openCvBtn').onclick=()=>openFilePicker('openCvFile');document.getElementById('openCvFile').onchange=e=>{if(e.target.files[0])openCv(e.target.files[0]);e.target.value='';};document.getElementById('openTemplateBtn').onclick=()=>openFilePicker('openTemplateFile');document.getElementById('openTemplateFile').onchange=e=>{if(e.target.files[0])openTemplate(e.target.files[0]);e.target.value='';};document.getElementById('exportPdfBtn').onclick=exportPdf;document.getElementById('resetBtn').onclick=()=>{if(confirm('Reset all data to the sample CV?')){cvData=createDefaultData();saveData();init();}};renderEditor();renderPreview();}
loadData();init();
</script>
</body>
</html>
