<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local CV Builder</title>
  <style>
    :root{--bg:#eef2f7;--panel:#fff;--ink:#172033;--muted:#667085;--line:#d9e0ea;--brand:#2563eb;--brand-dark:#1d4ed8;--danger:#dc2626;--ok:#15803d;--shadow:0 18px 45px rgba(15,23,42,.12);--radius:18px}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}button,input,textarea,select{font:inherit}button{border:0;border-radius:10px;padding:.6rem .85rem;background:#e8eef8;color:#172033;cursor:pointer;font-weight:700;transition:.15s ease}button:hover{transform:translateY(-1px);background:#dbe6f6}.btn-primary{background:var(--brand);color:#fff}.btn-primary:hover{background:var(--brand-dark)}.btn-danger{background:#fee2e2;color:#991b1b}.btn-danger:hover{background:#fecaca}.btn-ghost{background:transparent;border:1px solid var(--line)}.app{min-height:100vh}.toolbar{position:sticky;top:0;z-index:20;display:flex;gap:.8rem;align-items:center;justify-content:space-between;padding:1rem 1.25rem;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}.brand{display:flex;flex-direction:column}.brand strong{font-size:1.1rem}.status{font-size:.85rem;color:var(--ok)}.actions{display:flex;gap:.55rem;flex-wrap:wrap;align-items:center}.template-picker{display:flex;gap:.4rem;align-items:center}.template-picker select{border:1px solid var(--line);border-radius:10px;padding:.55rem .75rem;background:#fff}.layout{display:grid;grid-template-columns:minmax(360px,480px) 1fr;gap:1.25rem;padding:1.25rem;align-items:start}.editor{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:1rem;max-height:calc(100vh - 100px);overflow:auto}.preview-wrap{display:flex;justify-content:center;overflow:auto;padding:.25rem}.editor h2{margin:.25rem 0 1rem}.editor-card{border:1px solid var(--line);border-radius:16px;padding:1rem;margin-bottom:1rem;background:#fbfdff}.editor-card h3{margin:.1rem 0 .8rem;font-size:1rem}.grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}.field{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.75rem}.field label{font-size:.82rem;font-weight:800;color:#344054}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:10px;padding:.65rem .75rem;background:#fff;color:var(--ink)}.field textarea{min-height:88px;resize:vertical}.style-grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem}.profile-photo-editor{border:1px solid var(--line);border-radius:14px;padding:.8rem;margin-bottom:.9rem;background:#fff}.profile-photo-actions{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}.profile-photo-preview{width:96px;height:96px;object-fit:cover;border:1px solid var(--line);border-radius:12px;background:#f8fafc}.range-row{display:flex;gap:.65rem;align-items:center}.range-row input{flex:1}.range-value{min-width:3.5rem;text-align:right;color:var(--muted);font-size:.85rem}.color-input{height:42px;padding:.2rem!important}.cv-page{--tpl-page-bg:#ffffff;--tpl-header-bg:transparent;--tpl-accent:#111827;--tpl-name:#111827;--tpl-headline:#475467;--tpl-contact:#475467;--tpl-heading:#111827;--tpl-label:#111827;--tpl-body:#253044;--tpl-header-font:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;--tpl-body-font:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;--tpl-label-font:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.section-head,.entry-head{display:flex;gap:.5rem;align-items:center;justify-content:space-between;margin-bottom:.7rem}.mini-actions{display:flex;gap:.35rem;flex-wrap:wrap}.mini-actions button{padding:.42rem .58rem;font-size:.82rem}.entry{border:1px dashed #cbd5e1;border-radius:14px;padding:.75rem;margin:.75rem 0;background:#fff}.error{color:#991b1b;background:#fee2e2;border-radius:10px;padding:.6rem .8rem;margin:.7rem 0;display:none}.cv-page{width:210mm;min-height:297mm;background:var(--tpl-page-bg);box-shadow:var(--shadow);color:var(--tpl-body);font-family:var(--tpl-body-font)}.cv-inner{padding:18mm}.cv-header{border-bottom:3px solid var(--tpl-accent);background:var(--tpl-header-bg);padding-bottom:12px;margin-bottom:22px}.cv-header-content{display:flex;gap:18px;align-items:flex-start}.cv-header-text{flex:1;min-width:0}.cv-photo{flex:0 0 auto;width:var(--photo-size);aspect-ratio:var(--photo-aspect);object-fit:cover;border-radius:var(--photo-radius);border:var(--photo-border-width) var(--photo-border-style) var(--tpl-accent);box-shadow:var(--photo-shadow);background:#fff}.cv-photo-as-is{aspect-ratio:auto;height:auto;object-fit:contain}.cv-name{font-family:var(--tpl-header-font);color:var(--tpl-name);font-size:34px;line-height:1.05;margin:0 0 7px;letter-spacing:-.04em}.cv-headline{font-family:var(--tpl-body-font);font-size:16px;color:var(--tpl-headline);margin:0 0 10px}.cv-contact{display:flex;flex-wrap:wrap;gap:8px 16px;color:var(--tpl-contact);font-size:12.5px}.cv-section{margin:0 0 20px;break-inside:avoid}.cv-section h2{font-family:var(--tpl-header-font);font-size:15px;text-transform:uppercase;letter-spacing:.12em;margin:0 0 10px;color:var(--tpl-heading)}.cv-entry{margin:0 0 9px;break-inside:avoid}.cv-label{font-family:var(--tpl-label-font);font-weight:800;color:var(--tpl-label);margin-right:.35rem}.cv-value{font-family:var(--tpl-body-font);white-space:pre-wrap;line-height:1.5;color:var(--tpl-body)}.template-modern .cv-inner{padding:17mm}.template-modern .cv-header{border:0;background:var(--tpl-header-bg,linear-gradient(135deg,#eff6ff,#f8fafc));border-radius:18px;padding:22px}.template-modern .cv-section h2{color:var(--tpl-heading);border-bottom:1px solid var(--tpl-accent);padding-bottom:6px}.template-classic{font-family:Georgia,Times New Roman,serif}.template-classic .cv-header{text-align:center;border-bottom:1px solid var(--tpl-accent)}.template-classic .cv-header-content{flex-direction:column;align-items:center}.template-classic .cv-header-text{width:100%}.template-classic .cv-name{font-size:32px;letter-spacing:0}.template-classic .cv-contact{justify-content:center}.template-classic .cv-section h2{text-align:center;border-top:1px solid var(--tpl-accent);border-bottom:1px solid var(--tpl-accent);padding:5px 0;letter-spacing:.08em}.template-minimal .cv-inner{padding:24mm}.template-minimal .cv-header{border-bottom:1px solid #e5e7eb}.template-minimal .cv-name{font-weight:500}.template-minimal .cv-section h2{font-size:12px;color:var(--tpl-heading);border-bottom:1px solid var(--tpl-accent);padding-bottom:8px}.template-minimal .cv-value{color:var(--tpl-body)}.template-sidebar .cv-inner{padding:0;display:grid;grid-template-columns:68mm 1fr;min-height:297mm}.template-sidebar .side{background:var(--tpl-sidebar-bg,var(--tpl-header-bg));color:var(--tpl-name);padding:18mm 10mm}.template-sidebar .main{padding:18mm 13mm}.template-sidebar .cv-header{border:0;padding:0;margin:0}.template-sidebar .cv-header-content{flex-direction:column}.template-sidebar .cv-photo{max-width:100%}.template-sidebar .cv-name{color:var(--tpl-name);font-size:28px}.template-sidebar .cv-headline,.template-sidebar .cv-contact{color:var(--tpl-contact);display:block}.template-sidebar .cv-contact span{display:block;margin:.45rem 0;overflow-wrap:anywhere}.template-sidebar .cv-section h2{color:var(--tpl-heading);border-bottom:2px solid var(--tpl-accent);padding-bottom:6px}.empty{color:#98a2b3;font-style:italic}@media(max-width:980px){.layout{grid-template-columns:1fr}.editor{max-height:none}.cv-page{width:100%;min-height:auto}.grid{grid-template-columns:1fr}.toolbar{position:static;align-items:flex-start;flex-direction:column}.template-sidebar .cv-inner{grid-template-columns:1fr}.template-sidebar .side,.template-sidebar .main{padding:1.5rem}}@page{size:A4;margin:0}@media print{body{background:#fff}.toolbar,.editor{display:none!important}.layout{display:block;padding:0}.preview-wrap{padding:0;overflow:visible}.cv-page{box-shadow:none;width:210mm;min-height:297mm;margin:0 auto}.cv-section,.cv-entry{break-inside:avoid}.template-modern .cv-header{border:1px solid var(--tpl-accent)}}
  </style>
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="brand"><strong>Local CV Builder</strong><span id="status" class="status">Ready</span></div>
      <div class="actions">
        <label class="template-picker">Template <select id="templateSelect" aria-label="Choose CV template"></select></label>
        <button id="exportJsonBtn">Export JSON</button><button id="importJsonBtn">Import JSON</button><input id="importFile" type="file" accept="application/json,.json" hidden>
        <button id="exportPdfBtn" class="btn-primary">Export PDF</button><button id="resetBtn" class="btn-danger">Reset sample data</button>
      </div>
    </header>
    <main class="layout"><aside class="editor" id="editor" aria-label="CV editor"></aside><section class="preview-wrap" aria-label="Live CV preview"><div id="preview"></div></section></main>
  </div>
<script>
(function(){
'use strict';
const STORAGE_KEY='localCvBuilderDataV1';
const uid=prefix=>prefix+'-'+Math.random().toString(36).slice(2,9)+'-'+Date.now().toString(36);
let cvData;
const templates={modern:{name:'Modern',cssClass:'template-modern',render:renderTemplateModern},classic:{name:'Classic',cssClass:'template-classic',render:renderTemplateClassic},minimal:{name:'Minimal',cssClass:'template-minimal',render:renderTemplateMinimal},sidebar:{name:'Sidebar',cssClass:'template-sidebar',render:renderTemplateSidebar}};
const fontChoices=['Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif','Georgia, Times New Roman, serif','Arial, Helvetica, sans-serif','Verdana, Geneva, sans-serif','Trebuchet MS, Arial, sans-serif','Courier New, Courier, monospace'];
const fontNames=['Inter / System','Georgia','Arial','Verdana','Trebuchet MS','Courier New'];
function defaultStyles(){return{colors:{page:'#ffffff',header:'#eff6ff',sidebar:'#172033',accent:'#2563eb',name:'#111827',headline:'#475467',contact:'#475467',sectionHeading:'#2563eb',label:'#111827',body:'#253044'},fonts:{headers:fontChoices[0],paragraphs:fontChoices[0],labels:fontChoices[0]}};}
function defaultPhoto(){return{src:'',fileName:'',size:96,aspect:'as-is',roundness:12,borderStyle:'solid',borderWidth:2,shadow:'soft'};}
function createDefaultData(){return{version:1,meta:{documentTitle:'My CV',selectedTemplate:'modern'},styles:defaultStyles(),profile:{fullName:'Your Name',headline:'Solution Architect / Web Developer',email:'you@example.com',phone:'+1 555 010 1234',location:'City, Country',website:'yourwebsite.com',linkedin:'linkedin.com/in/yourname',github:'github.com/yourname',photo:defaultPhoto()},sections:[{id:'summary',type:'section',heading:'Professional Summary',entries:[{id:uid('entry'),label:'',value:'Solution Architect and Web Developer with experience designing scalable digital products, integrating business systems, and leading delivery from discovery through launch. Strong focus on clean architecture, pragmatic engineering, accessibility, and measurable outcomes.'}]},{id:'experience',type:'section',heading:'Experience',entries:[{id:uid('entry'),label:'Company',value:'Example Technology Group'},{id:uid('entry'),label:'Role',value:'Senior Solution Architect'},{id:uid('entry'),label:'Period',value:'Jan 2022 - Present'},{id:uid('entry'),label:'Description',value:'Led architecture for customer-facing web platforms, defined integration patterns, and partnered with product, design, and engineering teams. Improved deployment reliability, clarified technical roadmaps, and mentored developers across frontend and backend practices.'}]},{id:'projects',type:'section',heading:'Projects',entries:[{id:uid('entry'),label:'CV Builder Platform',value:'Designed a browser-only document editor with import/export workflows, local persistence, and print-ready rendering.'},{id:uid('entry'),label:'Integration Modernization',value:'Migrated legacy data exchange flows to API-first services with validation, observability, and clear ownership boundaries.'}]},{id:'skills',type:'section',heading:'Skills',entries:[{id:uid('entry'),label:'Architecture',value:'Solution design, domain modeling, API design, integrations, cloud-ready systems'},{id:uid('entry'),label:'Web',value:'HTML, CSS, JavaScript, accessibility, responsive UI, performance optimization'},{id:uid('entry'),label:'Delivery',value:'Technical discovery, stakeholder communication, documentation, mentoring'}]},{id:'education',type:'section',heading:'Education',entries:[{id:uid('entry'),label:'Degree',value:'B.Sc. Computer Science or equivalent experience'},{id:uid('entry'),label:'Institution',value:'University / Institution Name'}]},{id:'languages',type:'section',heading:'Languages',entries:[{id:uid('entry'),label:'English',value:'Professional proficiency'},{id:uid('entry'),label:'Additional language',value:'Conversational'}]}]};}
function escapeHtml(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function loadData(){try{const saved=localStorage.getItem(STORAGE_KEY);cvData=saved?validateData(JSON.parse(saved)):createDefaultData();}catch(e){cvData=createDefaultData();setStatus('Could not load saved data; using sample',true);} }
function saveData(){localStorage.setItem(STORAGE_KEY,JSON.stringify(cvData));setStatus('Saved locally');}
function setStatus(msg,isError){const el=document.getElementById('status');el.textContent=msg;el.style.color=isError?'#991b1b':'#15803d';}
function validateData(data){if(!data||typeof data!=='object')throw new Error('JSON must be an object.');if(!data.profile||typeof data.profile!=='object')throw new Error('Missing profile object.');if(!Array.isArray(data.sections))throw new Error('Missing sections array.');const clean=createDefaultData();clean.version=Number(data.version)||1;clean.meta={documentTitle:String(data.meta?.documentTitle||'My CV'),selectedTemplate:templates[data.meta?.selectedTemplate]?data.meta.selectedTemplate:'modern'};clean.styles=normalizeStyles(data.styles);clean.profile={...clean.profile,...Object.fromEntries(Object.keys(clean.profile).filter(k=>k!=='photo').map(k=>[k,String(data.profile[k]??'')]))};clean.profile.photo=normalizePhoto(data.profile.photo);clean.sections=data.sections.map((s,i)=>({id:String(s.id||uid('section')),type:'section',heading:String(s.heading||'Section '+(i+1)),entries:Array.isArray(s.entries)?s.entries.map(e=>({id:String(e.id||uid('entry')),label:String(e.label??''),value:String(e.value??'')})):[]}));return clean;}
function renderEditor(){const editor=document.getElementById('editor'),profileKeys=Object.keys(cvData.profile).filter(k=>k!=='photo');editor.innerHTML=`<h2>Editor</h2><div id="error" class="error"></div>${styleEditorHtml()}<div class="editor-card"><h3>Profile</h3>${photoEditorHtml()}<div class="grid">${profileKeys.map(k=>fieldHtml('profile',k,labelize(k),cvData.profile[k],k==='headline')).join('')}</div></div><div class="section-head"><h2>Sections</h2><button id="addSectionBtn" class="btn-primary">Add section</button></div><div id="sections"></div>`;document.getElementById('sections').innerHTML=cvData.sections.map((s,si)=>sectionEditorHtml(s,si)).join('');bindEditorEvents();}
function normalizePhoto(photo){const d=defaultPhoto(),p=photo&&typeof photo==='object'?photo:{};const borderStyles=['none','solid','dashed','dotted','double'],shadows=['none','soft','strong'];return{src:String(p.src||''),fileName:String(p.fileName||''),size:Math.min(220,Math.max(48,Number(p.size)||d.size)),aspect:['as-is','1:1','2:3'].includes(p.aspect)?p.aspect:d.aspect,roundness:Math.min(110,Math.max(0,Number(p.roundness)||0)),borderStyle:borderStyles.includes(p.borderStyle)?p.borderStyle:d.borderStyle,borderWidth:Math.min(12,Math.max(0,Number(p.borderWidth)||d.borderWidth)),shadow:shadows.includes(p.shadow)?p.shadow:d.shadow};}
function normalizeStyles(styles){const d=defaultStyles(),src=styles&&typeof styles==='object'?styles:{},colors={...d.colors},fonts={...d.fonts};Object.keys(colors).forEach(k=>{const v=String(src.colors?.[k]||colors[k]);colors[k]=/^#[0-9a-f]{6}$/i.test(v)?v:colors[k];});Object.keys(fonts).forEach(k=>{const v=String(src.fonts?.[k]||fonts[k]);fonts[k]=fontChoices.includes(v)?v:fonts[k];});return{colors,fonts};}
function colorField(key,label){return `<div class="field"><label for="style-color-${key}">${label}</label><input class="color-input" id="style-color-${key}" type="color" data-style-color="${key}" value="${escapeHtml(cvData.styles.colors[key])}"></div>`;}
function fontField(key,label){return `<div class="field"><label for="style-font-${key}">${label}</label><select id="style-font-${key}" data-style-font="${key}">${fontChoices.map((f,i)=>`<option value="${escapeHtml(f)}" ${cvData.styles.fonts[key]===f?'selected':''}>${fontNames[i]}</option>`).join('')}</select></div>`;}
function styleEditorHtml(){return `<div class="editor-card"><div class="section-head"><h3>Template styles</h3><button id="resetStylesBtn" class="btn-ghost" type="button">Reset styles</button></div><h3>Colors</h3><div class="style-grid">${[['page','Page background'],['header','Header background'],['sidebar','Sidebar background'],['accent','Accent / rules'],['name','Name'],['headline','Headline'],['contact','Contact'],['sectionHeading','Section headings'],['label','Labels'],['body','Body text']].map(([k,l])=>colorField(k,l)).join('')}</div><h3>Fonts</h3><div class="style-grid">${fontField('headers','Headers')}${fontField('paragraphs','Paragraphs')}${fontField('labels','Labels')}</div></div>`;}
function photoEditorHtml(){const p=normalizePhoto(cvData.profile.photo);cvData.profile.photo=p;return `<div class="profile-photo-editor"><div class="section-head"><h3>Photo</h3><div class="profile-photo-actions"><input id="photoFile" type="file" accept="image/*" hidden><button id="choosePhotoBtn" type="button">Choose photo</button>${p.src?'<button id="removePhotoBtn" class="btn-danger" type="button">Remove</button>':''}</div></div>${p.src?`<img class="profile-photo-preview" src="${escapeHtml(p.src)}" alt="Profile photo preview"><p class="status">${escapeHtml(p.fileName||'Selected photo')}</p>`:'<p class="empty">No photo selected.</p>'}<div class="style-grid"><div class="field"><label for="photoAspect">Aspect ratio</label><select id="photoAspect" data-photo="aspect"><option value="as-is" ${p.aspect==='as-is'?'selected':''}>As is</option><option value="1:1" ${p.aspect==='1:1'?'selected':''}>1:1 square</option><option value="2:3" ${p.aspect==='2:3'?'selected':''}>2:3 portrait</option></select></div><div class="field"><label for="photoBorderStyle">Border style</label><select id="photoBorderStyle" data-photo="borderStyle">${['none','solid','dashed','dotted','double'].map(v=>`<option value="${v}" ${p.borderStyle===v?'selected':''}>${labelize(v)}</option>`).join('')}</select></div><div class="field"><label for="photoShadow">Shadow</label><select id="photoShadow" data-photo="shadow">${['none','soft','strong'].map(v=>`<option value="${v}" ${p.shadow===v?'selected':''}>${labelize(v)}</option>`).join('')}</select></div><div class="field"><label for="photoSize">Image size</label><div class="range-row"><input id="photoSize" type="range" min="48" max="220" data-photo="size" value="${p.size}"><span class="range-value">${p.size}px</span></div></div><div class="field"><label for="photoRoundness">Roundness</label><div class="range-row"><input id="photoRoundness" type="range" min="0" max="110" data-photo="roundness" value="${p.roundness}"><span class="range-value">${p.roundness}px</span></div></div><div class="field"><label for="photoBorderWidth">Border width</label><div class="range-row"><input id="photoBorderWidth" type="range" min="0" max="12" data-photo="borderWidth" value="${p.borderWidth}"><span class="range-value">${p.borderWidth}px</span></div></div></div></div>`;}
function labelize(k){return k.replace(/([A-Z])/g,' $1').replace(/^./,m=>m.toUpperCase());}
function fieldHtml(scope,key,label,value,long){const id=scope+'-'+key;return `<div class="field"><label for="${id}">${escapeHtml(label)}</label>${long?`<textarea id="${id}" data-profile="${key}">${escapeHtml(value)}</textarea>`:`<input id="${id}" data-profile="${key}" value="${escapeHtml(value)}">`}</div>`;}
function sectionEditorHtml(s,si){return `<div class="editor-card"><div class="section-head"><strong>Section ${si+1}</strong><div class="mini-actions"><button data-move-section="${si},-1">↑</button><button data-move-section="${si},1">↓</button><button class="btn-danger" data-remove-section="${si}">Delete</button></div></div><div class="field"><label for="heading-${s.id}">Heading</label><input id="heading-${s.id}" data-section-heading="${si}" value="${escapeHtml(s.heading)}"></div>${s.entries.map((e,ei)=>entryEditorHtml(e,si,ei)).join('')}<button class="btn-primary" data-add-entry="${si}">Add key/value entry</button></div>`;}
function entryEditorHtml(e,si,ei){return `<div class="entry"><div class="entry-head"><strong>Entry ${ei+1}</strong><div class="mini-actions"><button data-move-entry="${si},${ei},-1">↑</button><button data-move-entry="${si},${ei},1">↓</button><button class="btn-danger" data-remove-entry="${si},${ei}">Delete</button></div></div><div class="field"><label>Label</label><input data-entry-label="${si},${ei}" value="${escapeHtml(e.label)}"></div><div class="field"><label>Value</label><textarea data-entry-value="${si},${ei}">${escapeHtml(e.value)}</textarea></div></div>`;}
function bindEditorEvents(){document.querySelectorAll('[data-style-color]').forEach(el=>el.addEventListener('input',()=>{cvData.styles.colors[el.dataset.styleColor]=el.value;update();}));document.querySelectorAll('[data-style-font]').forEach(el=>el.addEventListener('change',()=>{cvData.styles.fonts[el.dataset.styleFont]=el.value;update();}));document.getElementById('resetStylesBtn').onclick=()=>{cvData.styles=defaultStyles();update(true);};document.querySelectorAll('[data-profile]').forEach(el=>el.addEventListener('input',()=>{cvData.profile[el.dataset.profile]=el.value;update();}));document.querySelectorAll('[data-photo]').forEach(el=>el.addEventListener('input',()=>{const k=el.dataset.photo;cvData.profile.photo[k]=['size','roundness','borderWidth'].includes(k)?Number(el.value):el.value;update(true);}));const choosePhoto=document.getElementById('choosePhotoBtn'),photoFile=document.getElementById('photoFile'),removePhoto=document.getElementById('removePhotoBtn');if(choosePhoto&&photoFile){choosePhoto.onclick=()=>photoFile.click();photoFile.onchange=e=>{const file=e.target.files[0];if(!file)return;if(!file.type.startsWith('image/')){showError('Please choose an image file.');return;}const reader=new FileReader();reader.onload=()=>{cvData.profile.photo={...normalizePhoto(cvData.profile.photo),src:String(reader.result),fileName:file.name};update(true);};reader.readAsDataURL(file);};}if(removePhoto)removePhoto.onclick=()=>{cvData.profile.photo=defaultPhoto();update(true);};document.querySelectorAll('[data-section-heading]').forEach(el=>el.addEventListener('input',()=>{cvData.sections[+el.dataset.sectionHeading].heading=el.value;update();}));document.querySelectorAll('[data-entry-label]').forEach(el=>el.addEventListener('input',()=>{const[a,b]=el.dataset.entryLabel.split(',').map(Number);cvData.sections[a].entries[b].label=el.value;update();}));document.querySelectorAll('[data-entry-value]').forEach(el=>el.addEventListener('input',()=>{const[a,b]=el.dataset.entryValue.split(',').map(Number);cvData.sections[a].entries[b].value=el.value;update();}));document.getElementById('addSectionBtn').onclick=addSection;document.querySelectorAll('[data-add-entry]').forEach(b=>b.onclick=()=>addEntry(+b.dataset.addEntry));document.querySelectorAll('[data-remove-section]').forEach(b=>b.onclick=()=>removeSection(+b.dataset.removeSection));document.querySelectorAll('[data-remove-entry]').forEach(b=>b.onclick=()=>{const[a,c]=b.dataset.removeEntry.split(',').map(Number);removeEntry(a,c);});document.querySelectorAll('[data-move-section]').forEach(b=>b.onclick=()=>{const[a,d]=b.dataset.moveSection.split(',').map(Number);moveSection(a,d);});document.querySelectorAll('[data-move-entry]').forEach(b=>b.onclick=()=>{const[a,c,d]=b.dataset.moveEntry.split(',').map(Number);moveEntry(a,c,d);});}
function update(rerenderEditor){saveData();if(rerenderEditor)renderEditor();renderPreview();}
function contactHtml(p){return ['email','phone','location','website','linkedin','github'].filter(k=>p[k]).map(k=>`<span>${escapeHtml(p[k])}</span>`).join('');}
function sectionsHtml(){return cvData.sections.map(s=>`<section class="cv-section"><h2>${escapeHtml(s.heading)}</h2>${s.entries.length?s.entries.filter(e=>e.label||e.value).map(e=>`<div class="cv-entry">${e.label?`<span class="cv-label">${escapeHtml(e.label)}:</span>`:''}<span class="cv-value">${escapeHtml(e.value)}</span></div>`).join(''):'<p class="empty">No entries yet.</p>'}</section>`).join('');}
function photoHtml(){const p=normalizePhoto(cvData.profile.photo);if(!p.src)return '';const shadow={none:'none',soft:'0 10px 25px rgba(15,23,42,.18)',strong:'0 18px 38px rgba(15,23,42,.32)'}[p.shadow];const aspect=p.aspect==='1:1'?'1 / 1':p.aspect==='2:3'?'2 / 3':'auto';const cls=p.aspect==='as-is'?' cv-photo-as-is':'';return `<img class="cv-photo${cls}" src="${escapeHtml(p.src)}" alt="Profile photo" style="--photo-size:${p.size}px;--photo-aspect:${aspect};--photo-radius:${p.roundness}px;--photo-border-style:${p.borderStyle};--photo-border-width:${p.borderStyle==='none'?0:p.borderWidth}px;--photo-shadow:${shadow};">`;}
function headerHtml(){const p=cvData.profile;return `<header class="cv-header"><div class="cv-header-content">${photoHtml()}<div class="cv-header-text"><h1 class="cv-name">${escapeHtml(p.fullName||'Your Name')}</h1>${p.headline?`<p class="cv-headline">${escapeHtml(p.headline)}</p>`:''}<div class="cv-contact">${contactHtml(p)}</div></div></div></header>`;}
function styleVars(){const s=cvData.styles||defaultStyles(),c=s.colors,f=s.fonts;return `--tpl-page-bg:${c.page};--tpl-header-bg:${c.header};--tpl-sidebar-bg:${c.sidebar};--tpl-accent:${c.accent};--tpl-name:${c.name};--tpl-headline:${c.headline};--tpl-contact:${c.contact};--tpl-heading:${c.sectionHeading};--tpl-label:${c.label};--tpl-body:${c.body};--tpl-header-font:${f.headers};--tpl-body-font:${f.paragraphs};--tpl-label-font:${f.labels};`;}
function renderPreview(){cvData.styles=normalizeStyles(cvData.styles);const selected=cvData.meta.selectedTemplate;document.getElementById('preview').innerHTML=templates[selected].render(cvData);document.title=cvData.meta.documentTitle||'My CV';}
function page(cls,body){return `<article class="cv-page ${cls}" style="${escapeHtml(styleVars())}"><div class="cv-inner">${body}</div></article>`;}
function renderTemplateModern(){return page('template-modern',headerHtml()+sectionsHtml());}
function renderTemplateClassic(){return page('template-classic',headerHtml()+sectionsHtml());}
function renderTemplateMinimal(){return page('template-minimal',headerHtml()+sectionsHtml());}
function renderTemplateSidebar(){return `<article class="cv-page template-sidebar" style="${escapeHtml(styleVars())}"><div class="cv-inner"><aside class="side">${headerHtml()}</aside><main class="main">${sectionsHtml()}</main></div></article>`;}
function addSection(){cvData.sections.push({id:uid('section'),type:'section',heading:'New Section',entries:[{id:uid('entry'),label:'Label',value:'Value'}]});update(true);}function removeSection(i){if(confirm('Delete this section?')){cvData.sections.splice(i,1);update(true);}}function addEntry(i){cvData.sections[i].entries.push({id:uid('entry'),label:'Label',value:'Value'});update(true);}function removeEntry(i,j){if(confirm('Delete this entry?')){cvData.sections[i].entries.splice(j,1);update(true);}}function moveSection(i,d){const n=i+d;if(n<0||n>=cvData.sections.length)return;[cvData.sections[i],cvData.sections[n]]=[cvData.sections[n],cvData.sections[i]];update(true);}function moveEntry(i,j,d){const arr=cvData.sections[i].entries,n=j+d;if(n<0||n>=arr.length)return;[arr[j],arr[n]]=[arr[n],arr[j]];update(true);}
function exportJson(){const blob=new Blob([JSON.stringify(cvData,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cv-data.json';a.click();URL.revokeObjectURL(a.href);setStatus('JSON exported');}
function importJson(file){const reader=new FileReader();reader.onload=()=>{try{const parsed=validateData(JSON.parse(reader.result));if(confirm('Import this JSON and replace current CV data?')){cvData=parsed;saveData();init();setStatus('JSON imported');}}catch(e){showError('Invalid JSON: '+e.message);}};reader.readAsText(file);}function showError(msg){const e=document.getElementById('error');if(e){e.textContent=msg;e.style.display='block';}setStatus(msg,true);}function exportPdf(){window.print();}
function init(){const sel=document.getElementById('templateSelect');sel.innerHTML=Object.entries(templates).map(([k,t])=>`<option value="${k}">${t.name}</option>`).join('');sel.value=cvData.meta.selectedTemplate;sel.onchange=()=>{cvData.meta.selectedTemplate=sel.value;update(false);};document.getElementById('exportJsonBtn').onclick=exportJson;document.getElementById('importJsonBtn').onclick=()=>document.getElementById('importFile').click();document.getElementById('importFile').onchange=e=>{if(e.target.files[0])importJson(e.target.files[0]);e.target.value='';};document.getElementById('exportPdfBtn').onclick=exportPdf;document.getElementById('resetBtn').onclick=()=>{if(confirm('Reset all data to the sample CV?')){cvData=createDefaultData();saveData();init();}};renderEditor();renderPreview();}
loadData();init();
})();
</script>
</body>
</html>
